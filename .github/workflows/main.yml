name: Wails build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'pic-viewer'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux-amd64'
          - name: 'pic-viewer'
            platform:  'linux/arm64'
            os: 'ubuntu-24.04-arm64'
            artifact-name: 'linux-arm64'
          - name: 'pic-viewer'
            platform:  'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows-amd64'
          - name: 'pic-viewer'
            platform:  'windows/arm64'
            os: 'windows-latest'
            artifact-name: 'windows-arm64'
          - name: 'pic-viewer'
            platform:  'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'macos-universal'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.25'

      - name: Rename and Package Assets
        shell: bash
        run: |
          cd build/bin
          # Get version from tag if it exists, otherwise use 'latest'
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ $VERSION == refs/push/* || $VERSION == refs/heads/* ]]; then VERSION="latest"; fi
          
          for f in *; do
            if [ -d "$f" ]; then
              if [[ "$f" == *.app ]]; then
                zip -r "${f%.app}-${VERSION}-${{ matrix.build.artifact-name }}.app.zip" "$f"
                rm -rf "$f"
              fi
            elif [ -f "$f" ]; then
              # Skip already processed files
              if [[ "$f" == *"-${{ matrix.build.artifact-name }}"* ]]; then continue; fi
              
              ext="${f##*.}"
              base="${f%.*}"
              
              if [ "$ext" = "$f" ]; then
                # No extension (Linux binary)
                mv "$f" "${f}-${VERSION}-${{ matrix.build.artifact-name }}"
              else
                # Has extension (.exe, .deb, etc)
                mv "$f" "${base}-${VERSION}-${{ matrix.build.artifact-name }}.${ext}"
              fi
            fi
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.artifact-name }}
          path: build/bin/*


  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded artifacts
        run: ls -R artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
