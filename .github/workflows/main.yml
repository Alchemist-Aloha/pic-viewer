name: Wails build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'pic-viewer'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux-amd64'
          - name: 'pic-viewer'
            platform:  'linux/arm64'
            os: 'ubuntu-24.04-arm64'
            artifact-name: 'linux-arm64'
          - name: 'pic-viewer'
            platform:  'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows-amd64'
          - name: 'pic-viewer'
            platform:  'windows/arm64'
            os: 'windows-latest'
            artifact-name: 'windows-arm64'
          - name: 'pic-viewer'
            platform:  'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'macos-universal'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ $VERSION == refs/push/* || $VERSION == refs/heads/* ]]; then VERSION="latest"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          # Using a unique build-name fixes the upload conflict and ensures correct file naming
          build-name: ${{ matrix.build.name }}-${{ steps.get_version.outputs.version }}-${{ matrix.build.artifact-name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.25'

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        shell: bash
        run: |
          cd artifacts
          # Zip any directories (like macOS .app bundles) found within the artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              cd "$dir"
              for d in */; do
                if [ -d "$d" ]; then
                  zip -r "${d%/}.zip" "$d"
                  rm -rf "$d"
                fi
              done
              cd ..
            fi
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
