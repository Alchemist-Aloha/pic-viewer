name: Wails build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'pic-viewer'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux-amd64'
          - name: 'pic-viewer'
            platform:  'linux/arm64'
            os: 'ubuntu-24.04-arm64'
            artifact-name: 'linux-arm64'
          - name: 'pic-viewer'
            platform:  'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows-amd64'
          - name: 'pic-viewer'
            platform:  'windows/arm64'
            os: 'windows-latest'
            artifact-name: 'windows-arm64'
          - name: 'pic-viewer'
            platform:  'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'macos-universal'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: false
          go-version: '1.25'

      - name: Package Assets
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PLATFORM="${{ matrix.build.artifact-name }}"
          mkdir -p dist
          # The action leaves results in build/bin
          cd build/bin
          
          # List files for debugging if needed
          ls -R
          
          for f in *; do
            # Skip already processed or zip files
            if [[ "$f" == *.zip ]]; then continue; fi
            
            if [ -d "$f" ]; then
              if [[ "$f" == *.app ]]; then
                # Standard macOS .app bundle
                zip -r "../../dist/${f%.app}-${VERSION}-${PLATFORM}.app.zip" "$f"
              else
                # Other directories, zip them
                zip -r "../../dist/${f}-${VERSION}-${PLATFORM}.zip" "$f"
              fi
            elif [ -f "$f" ]; then
              ext="${f##*.}"
              base="${f%.*}"
              if [ "$ext" = "$f" ]; then
                # Linux binary (no extension)
                cp "$f" "../../dist/${f}-${VERSION}-${PLATFORM}"
              else
                # Windows exe/installer or other extensions
                cp "$f" "../../dist/${base}-${VERSION}-${PLATFORM}.${ext}"
              fi
            fi
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.artifact-name }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten Artifacts
        run: |
          mkdir -p release_assets
          find artifacts -type f -exec cp {} release_assets/ \;

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
